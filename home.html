<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Home</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:#111}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f6f8fb;margin:0}
    .wrap{width:100%;max-width:900px;padding:24px;text-align:center}
    h1{margin:0 0 18px;font-size:28px}
    .buttons{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
    .btn{flex:1 1 260px;min-height:120px;display:flex;align-items:center;justify-content:center;background:#0b69ff;color:#fff;border:0;border-radius:12px;font-size:20px;padding:18px;cursor:pointer;text-decoration:none;box-shadow:0 6px 18px rgba(11,105,255,0.18);transition:transform .12s ease,box-shadow .12s ease}
    .btn.secondary{background:#111827}
    .btn.ghost{background:#fff;color:#0b69ff;border:2px solid #0b69ff}
    .btn:active{transform:translateY(1px)}
    .note{margin-top:18px;color:#555;font-size:14px}
    @media (max-width:640px){.btn{min-height:90px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin Panel</h1>
    <div class="buttons" role="navigation" aria-label="Main actions">
      <a class="btn" href="collection.html" role="button">Collection</a>
      <a class="btn" href="InputAlbum.html" role="button">Input Album</a>
      <a class="btn secondary" href="maintenance.html" role="button">Maintenance</a>
    </div>
    <p class="note">Links to pages: <strong>Input Album</strong> exists. Create or update the other pages as needed.</p>
  </div>
</body>
</html>
